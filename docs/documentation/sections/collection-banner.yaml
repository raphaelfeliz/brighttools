section: "collection-banner.liquid"
description: "Liquid section template for Collection banner."
blocks:
settings:
  - "full_width (checkbox)"
  - "allow_transparent_header (checkbox)"
  - "enable_parallax (checkbox)"
  - "show_collection_title (checkbox)"
  - "show_collection_description (checkbox)"
  - "show_collection_image (checkbox)"
  - "collection_title_size (select)"
  - "image_size (select)"
  - "image (image_picker)"
  - "mobile_image (image_picker)"
  - "mobile_text_position (select)"
  - "desktop_text_position (select)"
  - "featured_product (product)"
  - "featured_product_heading (text)"
  - "text_color (color)"
  - "overlay_color (color)"
  - "overlay_opacity (range)"
