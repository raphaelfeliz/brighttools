section: "mar26-header.liquid"
description: "Liquid section template for MAR26 Header."
blocks:
  - "mega_menu (Mega menu)"
settings:
  - "enable_sticky (checkbox)"
  - "hide_on_scroll (checkbox)"
  - "logo (image_picker)"
  - "logo_max_width (range)"
  - "logo_mobile_max_width (range)"
  - "menu (link_list)"
  - "sidebar_menu (link_list)"
  - "secondary_menu (link_list)"
  - "menu_open_trigger (select)"
  - "opening_from (select)"
  - "layout (select)"
  - "show_social_media (checkbox)"
  - "show_locale_selector (checkbox)"
  - "show_country_selector (checkbox)"
  - "show_country_flag (checkbox)"
  - "show_country_name (checkbox)"
  - "transparent_header_text_color (color)"
  - "transparent_logo (image_picker)"
  - "reduce_padding (checkbox)"
  - "background_opacity (range)"
  - "background_blur_radius (range)"
