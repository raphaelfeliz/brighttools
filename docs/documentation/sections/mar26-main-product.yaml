  - "sku (SKU)"
  - "badges (Badges)"
  - "price (Price)"
  - "mar26_quantity_price (MAR26 Quantity + Buy)"
  - "payment_terms (Payment installments)"
  - "rating (Rating)"
  - "separator (Separator)"
  - "description (Description)"
  - "variant_picker (Variant picker)"
  - "quantity_selector (Quantity selector)"
