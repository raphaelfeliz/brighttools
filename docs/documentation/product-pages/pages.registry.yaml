# Product Pages Registry
# Lists all storefront product templates, detailing their type and status.

product_pages:
  - template: "product.json"
    type: "standard"
    description: "Default product page layout containing core storefront sections."
    status: "not active"
  - template: "product.bt-brooms.json"
    type: "custom"
    description: "Custom layout tailored for brooms, featuring scroll to top and product specific features."
    status: "active"
  - template: "product.caravan-c-b-page.json"
    type: "custom"
    description: "Custom layout tailored for caravan bundles with a special buying flow."
    status: "not active"
  - template: "product.floor-wipes-fresh-home.json"
    type: "custom"
    description: "Custom layout tailored for fresh home floor wipes."
    status: "not active"
  - template: "product.mar-page.json"
    type: "custom"
    description: "Custom page layout for MAR-page."
    status: "not active"
  - template: "product.mar26-caravan-bundle-page.json"
    type: "custom"
    description: "Custom product bundle layout under the mar26 namespace."
    status: "not active"
  - template: "product.mar26-product.json"
    type: "custom"
    description: "Custom product template under the mar26 namespace with addons buy grids."
    status: "not active"
  - template: "product.mar26-with-bundle-builder.json"
    type: "custom"
    description: "Custom product page with embedded bundle builder application."
    status: "not active"
  - template: "product.mar26.json"
    type: "custom"
    description: "Custom base template under the mar26 namespace."
    status: "not active"
  - template: "product.pre-order.json"
    type: "standard"
    description: "Product pre-order template layout."
    status: "not active"
